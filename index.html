<!doctype html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
    <title>Fluxus Unlimited</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: rgb(10, 10, 10);
        color: rgb(225, 225, 225);
        font-size: 18px;
        font-family: "Google Sans", sans-serif;
        font-weight: 400;
        height: 100%;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }
      input {
        background-color: transparent;
        color: rgb(225, 225, 225);
        border: none;
        font-size: 16px;
        font-family: "Google Sans", sans-serif;
        font-weight: 400;
        width: 88%;
        height: 92.5%;
        padding-left: 14px;
        padding-right: 14px;
        letter-spacing: 1px;
      }
      input:focus { outline: none; }
      ::placeholder { opacity: 30%; color: rgb(200, 200, 200); }
      .no-cursor { caret-color: transparent; }
      .banner {
        width: 100%;
        height: 220px;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .banner-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
      .banner-text {
        position: relative;
        z-index: 2;
        text-align: center;
        margin-bottom: 40px;
      }
      .banner-title {
        font-weight: 700;
        font-style: italic;
        font-size: 48px;
        letter-spacing: 1px;
        color: #ffffff;
        text-shadow: 0 0 40px rgba(255,255,255,0.18);
        line-height: 1;
        margin-bottom: 10px;
      }
      .banner-sub {
        font-weight: 400;
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(220, 215, 225, 0.65);
      }
      .banner-divider {
        width: 180px;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(200,195,210,0.35), transparent);
        margin: 8px auto 0;
      }
      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 50px;
        padding-bottom: 80px;
      }
      .frame {
        border: rgb(40, 40, 40) 1.5px solid;
        border-radius: 10px;
        width: 500px;
        height: 42px;
        background-color: rgb(18, 18, 18);
        transition: border-color 0.2s;
        display: flex;
        align-items: center;
      }
      .frame:hover { border-color: rgb(65, 65, 65); }
      .frame:focus-within { border-color: rgb(85, 85, 85); }
      .primary-search-action {
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: inherit;
        padding: 0;
        margin-right: 7.5px;
        margin-left: -6px;
        cursor: pointer;
      }
      #status {
        margin-top: 14px;
        font-size: 12px;
        letter-spacing: 1px;
        color: rgba(200, 200, 200, 0.4);
        min-height: 18px;
      }
      #status.error { color: rgba(255, 100, 100, 0.7); }
    </style>
  </head>

    <div class="content">
      <div class="banner-text">
        <div class="banner-title">Fluxus Unlimited</div>
        <div class="banner-sub">Unblocked &nbsp;&#8226;&nbsp; Unrestricted &nbsp;&#8226;&nbsp; Unlimited</div>
        <div class="banner-divider"></div>
      </div>

      <form id="primary-search-form" class="frame" onsubmit="handleSearch(event)">
        <input
          id="search"
          class="no-cursor"
          autocomplete="off"
          autocapitalize="off"
          placeholder="Search DuckDuckGo or enter URL ..."
        />
        <button class="primary-search-action" type="submit" aria-label="Go">
          <svg style="opacity:45%; margin-top:-3px; vertical-align:middle;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m21 21-4.34-4.34"/>
            <circle cx="11" cy="11" r="8"/>
          </svg>
        </button>
      </form>
      <div id="status"></div>
    </div>

    <script>
      // Detect our base URL so all paths work whether on jsDelivr or GitHub Pages
      const BASE = (() => {
        const s = document.currentScript || {};
        const loc = (s.src || location.href).replace(/\/[^\/]*$/, "");
        return loc;
      })();

      const statusEl = document.getElementById("status");
      function setStatus(msg, isError = false) {
        statusEl.textContent = msg;
        statusEl.className = isError ? "error" : "";
      }

      // Dynamically load UV scripts using the detected base
      function loadScript(url) {
        return new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = url;
          s.onload = res;
          s.onerror = () => rej(new Error("Failed to load " + url));
          document.head.appendChild(s);
        });
      }

      async function init() {
        try {
          await loadScript(BASE + "/uv/uv.bundle.js");
          await loadScript(BASE + "/uv/uv.config.js");

          // Patch config paths to be absolute based on our BASE
          __uv$config.handler  = BASE + "/uv/uv.handler.js";
          __uv$config.client   = BASE + "/uv/uv.client.js";
          __uv$config.bundle   = BASE + "/uv/uv.bundle.js";
          __uv$config.config   = BASE + "/uv/uv.config.js";
          __uv$config.sw       = BASE + "/uv/uv.sw.js";
          __uv$config.prefix   = BASE + "/service/";

          if ("serviceWorker" in navigator) {
            await navigator.serviceWorker.register(BASE + "/sw.js", {
              scope: BASE + "/service/"
            });
            setStatus("");
          } else {
            setStatus("service workers not supported", true);
          }
        } catch(err) {
          setStatus("init failed: " + err.message, true);
          console.error(err);
        }
      }

      init();

      function isURL(input) {
        try { new URL(input); return true; } catch (_) {}
        return input.includes(".") && !input.includes(" ");
      }

      function normalizeURL(input) {
        return /^https?:\/\//i.test(input) ? input : "https://" + input;
      }

      async function handleSearch(e) {
        e.preventDefault();
        const input = document.getElementById("search").value.trim();
        if (!input) return;
        setStatus("connecting...");

        const targetURL = isURL(input)
          ? normalizeURL(input)
          : "https://duckduckgo.com/?q=" + encodeURIComponent(input);

        try {
          await navigator.serviceWorker.ready;
          location.href = __uv$config.prefix + __uv$config.encodeUrl(targetURL);
        } catch(err) {
          setStatus("failed to connect", true);
          console.error(err);
        }
      }
    </script>
